<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memoria STEM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4; --surface: #eeecea; --card-bg: #ffffff;
    --text: #1a1a18; --text-muted: #7a7a74; --border: rgba(0,0,0,0.12);
    --radius-md: 8px; --radius-lg: 12px;
  }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  #game-wrap { width: 100%; max-width: 600px; }
  #header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
  #title { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  #stats { display: flex; gap: 12px; }
  .stat { display: flex; flex-direction: column; align-items: center; background: var(--surface); border-radius: var(--radius-md); padding: 6px 16px; }
  .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-val { font-size: 20px; font-weight: 600; }
  #board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .card { aspect-ratio: 1; border-radius: var(--radius-lg); cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.45s cubic-bezier(.4,0,.2,1); }
  .card.flipped, .card.matched { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; border-radius: var(--radius-lg); display: flex; flex-direction: column; align-items: center; justify-content: center; backface-visibility: hidden; -webkit-backface-visibility: hidden; }
  .front { background: var(--surface); border: 1px solid var(--border); }
  .back { transform: rotateY(180deg); padding: 8px; text-align: center; }
  .back-icon { font-size: 22px; margin-bottom: 4px; }
  .back-label { font-size: 11px; font-weight: 600; line-height: 1.3; }
  .back-hint { font-size: 9px; margin-top: 3px; line-height: 1.25; padding: 0 4px; opacity: 0.85; }
  #msg-bar { display: flex; align-items: center; justify-content: center; gap: 12px; min-height: 40px; }
  #msg { font-size: 14px; color: var(--text-muted); }
  button { font-family: inherit; font-size: 13px; padding: 7px 18px; border-radius: var(--radius-md); border: 1px solid var(--border); background: transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; color: var(--text); transition: background 0.15s; }
  button:hover { background: var(--surface); }
  #win-screen { display: none; text-align: center; padding: 2.5rem 2rem; background: var(--card-bg); border-radius: var(--radius-lg); border: 1px solid var(--border); }
  #win-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
  #win-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 1.5rem; }
  .hint-tooltip { position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #1a1a18; color: #fff; font-size: 11px; padding: 5px 10px; border-radius: 6px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 10; }
  .hint-tooltip::after { content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%); border:5px solid transparent; border-top-color:#1a1a18; }
  .card:hover .hint-tooltip { opacity: 1; }
</style>
</head>
<body>
<div id="game-wrap">
  <div id="header">
    <div id="title"><i class="ti ti-atom"></i> Memoria STEM</div>
    <div id="stats">
      <div class="stat"><span class="stat-label">Movs.</span><span class="stat-val" id="moves-val">0</span></div>
      <div class="stat"><span class="stat-label">Pares</span><span class="stat-val" id="pairs-val">0/8</span></div>
    </div>
  </div>
  <div id="board"></div>
  <div id="msg-bar">
    <span id="msg">Encuentra los 8 pares. Pasa el cursor sobre una carta para ver su pista.</span>
    <button onclick="initGame()"><i class="ti ti-refresh"></i> Reiniciar</button>
  </div>
  <div id="win-screen">
    <div id="win-title">¡Completado! 🎉</div>
    <div id="win-sub" id="win-sub"></div>
    <button onclick="initGame()"><i class="ti ti-player-play"></i> Jugar de nuevo</button>
  </div>
</div>

<script>
const PAIRS = [
  { id:'dna',  icon:'ti-dna',        label:'ADN',           hint:'Doble hélice en cada célula', sub:'Ácido desoxirribonucleico', color:'#1D9E75', bg:'#E1F5EE', text:'#085041', border:'#0F6E56' },
  { id:'atom', icon:'ti-atom',       label:'Átomo',         hint:'Todo lo que te rodea lo contiene', sub:'Unidad básica de la materia', color:'#178ADE', bg:'#E6F1FB', text:'#0C447C', border:'#185FA5' },
  { id:'pi',   icon:'ti-math-pi',    label:'π = 3.14159…',  hint:'Aparece en toda circunferencia', sub:'Número irracional fundamental', color:'#7F77DD', bg:'#EEEDFE', text:'#3C3489', border:'#534AB7' },
  { id:'bolt', icon:'ti-bolt',       label:'Electricidad',  hint:'Electrones en movimiento', sub:'Flujo de carga eléctrica', color:'#EF9F27', bg:'#FAEEDA', text:'#633806', border:'#854F0B' },
  { id:'cell', icon:'ti-microscope', label:'Célula',        hint:'La unidad más pequeña de la vida', sub:'Bloque básico de los seres vivos', color:'#D85A30', bg:'#FAECE7', text:'#712B13', border:'#993C1D' },
  { id:'grav', icon:'ti-planet',     label:'Gravedad',      hint:'Te mantiene en el suelo', sub:'F = G·m₁m₂/r²', color:'#5F5E5A', bg:'#F1EFE8', text:'#2C2C2A', border:'#888780' },
  { id:'co2',  icon:'ti-leaf',       label:'CO₂',           hint:'El gas que plantas respiran', sub:'Dióxido de carbono', color:'#639922', bg:'#EAF3DE', text:'#27500A', border:'#3B6D11' },
  { id:'wave', icon:'ti-wave-sine',  label:'Onda',          hint:'Luz y sonido viajan así', sub:'Energía en movimiento', color:'#D4537E', bg:'#FBEAF0', text:'#4B1528', border:'#993556' },
];

let flipped = [], matched = 0, moves = 0, locked = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function initGame() {
  matched = 0; moves = 0; flipped = []; locked = false;
  document.getElementById('moves-val').textContent = '0';
  document.getElementById('pairs-val').textContent = '0/8';
  document.getElementById('msg').textContent = 'Encuentra los 8 pares. Pasa el cursor sobre una carta para ver su pista.';
  document.getElementById('win-screen').style.display = 'none';
  document.getElementById('msg-bar').style.display = 'flex';
  document.getElementById('board').style.display = 'grid';
  document.getElementById('header').style.display = 'flex';

  const deck = shuffle([...PAIRS, ...PAIRS].map((p,i) => ({...p, uid:i})));
  const board = document.getElementById('board');
  board.innerHTML = '';

  deck.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = p.id;
    card.dataset.uid = p.uid;
    card.innerHTML = `
      <span class="hint-tooltip">${p.hint}</span>
      <div class="card-face front">
        <i class="ti ti-cards" style="font-size:28px; color:#aaa;"></i>
      </div>
      <div class="card-face back" style="background:${p.bg}; border:2px solid ${p.border};">
        <i class="ti ${p.icon} back-icon" style="color:${p.color};"></i>
        <div class="back-label" style="color:${p.text};">${p.label}</div>
        <div class="back-hint" style="color:${p.color};">${p.sub}</div>
      </div>`;
    card.addEventListener('click', () => handleFlip(card));
    board.appendChild(card);
  });
}

function handleFlip(card) {
  if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  card.classList.add('flipped');
  flipped.push(card);
  if (flipped.length === 2) {
    locked = true;
    moves++;
    document.getElementById('moves-val').textContent = moves;
    const [a,b] = flipped;
    if (a.dataset.id === b.dataset.id && a.dataset.uid !== b.dataset.uid) {
      a.classList.add('matched'); b.classList.add('matched');
      matched++;
      document.getElementById('pairs-val').textContent = matched+'/8';
      flipped = []; locked = false;
      if (matched === 8) showWin();
    } else {
      setTimeout(() => {
        a.classList.remove('flipped'); b.classList.remove('flipped');
        flipped = []; locked = false;
      }, 900);
    }
  }
}

function showWin() {
  setTimeout(() => {
    document.getElementById('board').style.display = 'none';
    document.getElementById('msg-bar').style.display = 'none';
    document.getElementById('header').style.display = 'none';
    document.getElementById('win-screen').style.display = 'block';
    document.getElementById('win-sub').textContent = `Completaste el juego en ${moves} movimientos. ¡Excelente memoria científica!`;
  }, 400);
}

initGame();
</script>
</body>
</html>
